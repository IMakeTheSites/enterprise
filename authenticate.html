<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CNT 4714 - Enterprise System Login</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #2c3e50;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .login-card {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        width: 350px;
      }
      h1 {
        color: #2c3e50;
        text-align: center;
        font-size: 1.5rem;
        margin-bottom: 25px;
      }
      .input-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #7f8c8d;
        font-weight: bold;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #ecf0f1;
        border-radius: 5px;
        box-sizing: border-box; /* Ensures padding doesn't affect width */
      }
      input[type="submit"] {
        width: 100%;
        padding: 12px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }
      input[type="submit"]:hover {
        background-color: #2980b9;
      }
      .footer {
        text-align: center;
        margin-top: 20px;
        color: #bdc3c7;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Enterprise System Login</h1>

      <form action="authenticate" method="POST">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>

        <input type="submit" value="Login" />
      </form>

      <div class="footer">CNT 4714 - Spring 2026 - Project 4</div>
    </div>
  </body>
</html>
